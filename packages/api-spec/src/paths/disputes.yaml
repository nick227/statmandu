collection:
  get:
    operationId: listDisputes
    summary: List disputes for a target (disputed stats are public)
    security: []
    tags: [disputes]
    parameters:
      - in: query
        name: targetType
        required: true
        schema: { $ref: '../components/schemas/common.yaml#/EntityType' }
      - in: query
        name: targetId
        required: true
        schema: { type: string }
    responses:
      '200':
        description: Disputes
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: array
                  items: { $ref: '../components/schemas/verification.yaml#/Dispute' }
      default:
        description: Unexpected error
        content:
          application/json:
            schema: { $ref: '../components/schemas/common.yaml#/ErrorResponse' }

  post:
    operationId: openDispute
    summary: Submit a public correction/dispute
    tags: [disputes]
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../components/schemas/verification.yaml#/OpenDisputeInput' }
    responses:
      '201':
        description: Dispute opened
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data: { $ref: '../components/schemas/verification.yaml#/Dispute' }
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'

item:
  patch:
    operationId: resolveDispute
    summary: Resolve or reject a dispute (admin only)
    security: [{ adminAuth: [] }]
    tags: [disputes]
    parameters:
      - in: path
        name: disputeId
        required: true
        schema: { type: string }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../components/schemas/verification.yaml#/ResolveDisputeInput' }
    responses:
      '200':
        description: Dispute updated
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data: { $ref: '../components/schemas/verification.yaml#/Dispute' }
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'
      '403':
        description: Admin only
        content:
          application/json:
            schema: { $ref: '../components/schemas/common.yaml#/ErrorResponse' }
      '404':
        $ref: '../components/responses/common.yaml#/NotFound'
