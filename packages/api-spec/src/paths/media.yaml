collection:
  get:
    operationId: listMedia
    summary: List media attached to a target (player, team, or game)
    security: []
    tags: [media]
    parameters:
      - in: query
        name: targetType
        required: true
        schema: { $ref: '../components/schemas/common.yaml#/EntityType' }
      - in: query
        name: targetId
        required: true
        schema: { type: string }
    responses:
      '200':
        description: Media assets
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: array
                  items: { $ref: '../components/schemas/social.yaml#/MediaAsset' }
      default:
        description: Unexpected error
        content:
          application/json:
            schema: { $ref: '../components/schemas/common.yaml#/ErrorResponse' }

recent:
  get:
    operationId: listRecentMedia
    summary: List recently attached YouTube media across the platform
    security: []
    tags: [media]
    parameters:
      - in: query
        name: limit
        schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
    responses:
      '200':
        description: Recent media assets
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: array
                  items: { $ref: '../components/schemas/social.yaml#/MediaAsset' }
      default:
        description: Unexpected error
        content:
          application/json:
            schema: { $ref: '../components/schemas/common.yaml#/ErrorResponse' }

youtube:
  post:
    operationId: attachYouTubeMedia
    summary: Attach a YouTube video to a player, team, or game
    tags: [media]
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../components/schemas/social.yaml#/AttachYouTubeInput' }
    responses:
      '201':
        description: Media attached
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data: { $ref: '../components/schemas/social.yaml#/MediaAsset' }
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'
