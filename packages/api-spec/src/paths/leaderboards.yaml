players:
  get:
    operationId: getPlayerLeaderboard
    summary: Rank players by a sport stat
    security: []
    tags: [leaderboards]
    parameters:
      - in: query
        name: sportSlug
        required: true
        schema: { type: string }
      - in: query
        name: stat
        required: true
        schema: { type: string }
      - in: query
        name: seasonId
        schema: { type: string }
      - in: query
        name: limit
        schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
    responses:
      '200':
        description: Player leaderboard
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: array
                  items: { $ref: '../components/schemas/games.yaml#/PlayerLeaderboardEntry' }
      '400':
        description: Unsupported sport or stat
        content:
          application/json:
            schema: { $ref: '../components/schemas/common.yaml#/ErrorResponse' }

