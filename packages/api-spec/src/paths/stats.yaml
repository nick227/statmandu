gameStats:
  get:
    operationId: getGameStats
    summary: Get the final box score for a game
    security: []
    tags: [stats]
    parameters:
      - in: path
        name: gameId
        required: true
        schema: { type: string }
    responses:
      '200':
        description: Box score
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: array
                  items: { $ref: '../components/schemas/games.yaml#/GameStatLine' }
      '404':
        $ref: '../components/responses/common.yaml#/NotFound'

