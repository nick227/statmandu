collection:
  get:
    operationId: listFollows
    summary: List followers of a target (player or team)
    security: []
    tags: [follows]
    parameters:
      - in: query
        name: targetType
        required: true
        schema: { $ref: '../components/schemas/common.yaml#/EntityType' }
      - in: query
        name: targetId
        required: true
        schema: { type: string }
    responses:
      '200':
        description: Follows
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: array
                  items: { $ref: '../components/schemas/social.yaml#/Follow' }
      default:
        description: Unexpected error
        content:
          application/json:
            schema: { $ref: '../components/schemas/common.yaml#/ErrorResponse' }

  post:
    operationId: createFollow
    summary: Follow a player or team
    tags: [follows]
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../components/schemas/social.yaml#/CreateFollowInput' }
    responses:
      '201':
        description: Now following
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data: { $ref: '../components/schemas/social.yaml#/Follow' }
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'

item:
  delete:
    operationId: deleteFollow
    summary: Unfollow
    tags: [follows]
    parameters:
      - in: path
        name: followId
        required: true
        schema: { type: string }
    responses:
      '200':
        description: Unfollowed
        content:
          application/json:
            schema:
              type: object
              properties:
                data: { type: 'null' }
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'
      '403':
        description: Not the owner of this follow
        content:
          application/json:
            schema: { $ref: '../components/schemas/common.yaml#/ErrorResponse' }
      '404':
        $ref: '../components/responses/common.yaml#/NotFound'
