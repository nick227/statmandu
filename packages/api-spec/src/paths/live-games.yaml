reporters:
  post:
    operationId: joinGameAsReporter
    summary: Join a game as a scorekeeper/broadcaster/spectator reporter
    tags: [live-games]
    parameters:
      - in: path
        name: gameId
        required: true
        schema: { type: string }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../components/schemas/games.yaml#/JoinReporterInput' }
    responses:
      '201':
        description: Reporter registered
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data: { $ref: '../components/schemas/games.yaml#/GameReporter' }
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'
      '404':
        $ref: '../components/responses/common.yaml#/NotFound'

inviteReporter:
  post:
    operationId: inviteGameReporter
    summary: Invite or assign a reporter to a game (game manager only)
    tags: [live-games]
    parameters:
      - in: path
        name: gameId
        required: true
        schema: { type: string }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../components/schemas/games.yaml#/InviteReporterInput' }
    responses:
      '201':
        description: Reporter invited
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data: { $ref: '../components/schemas/games.yaml#/GameReporter' }
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'
      '403':
        description: Not allowed to manage reporters
        content:
          application/json:
            schema: { $ref: '../components/schemas/common.yaml#/ErrorResponse' }
      '404':
        $ref: '../components/responses/common.yaml#/NotFound'

reporter:
  patch:
    operationId: updateGameReporter
    summary: Change a reporter role or team assignment (game manager only)
    tags: [live-games]
    parameters:
      - in: path
        name: gameId
        required: true
        schema: { type: string }
      - in: path
        name: reporterId
        required: true
        schema: { type: string }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../components/schemas/games.yaml#/UpdateReporterInput' }
    responses:
      '200':
        description: Reporter updated
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data: { $ref: '../components/schemas/games.yaml#/GameReporter' }
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'
      '403':
        description: Not allowed to manage reporters
        content:
          application/json:
            schema: { $ref: '../components/schemas/common.yaml#/ErrorResponse' }
      '404':
        $ref: '../components/responses/common.yaml#/NotFound'

  delete:
    operationId: removeGameReporter
    summary: Remove a reporter from a game (game manager only)
    tags: [live-games]
    parameters:
      - in: path
        name: gameId
        required: true
        schema: { type: string }
      - in: path
        name: reporterId
        required: true
        schema: { type: string }
    responses:
      '200':
        description: Reporter removed
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data: { type: ['object', 'null'] }
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'
      '403':
        description: Not allowed to manage reporters
        content:
          application/json:
            schema: { $ref: '../components/schemas/common.yaml#/ErrorResponse' }
      '404':
        $ref: '../components/responses/common.yaml#/NotFound'

startLive:
  post:
    operationId: startLiveGame
    summary: Transition a game to LIVE (official scorer or admin reporter only)
    tags: [live-games]
    parameters:
      - in: path
        name: gameId
        required: true
        schema: { type: string }
    responses:
      '200':
        description: Game now live
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data: { $ref: '../components/schemas/games.yaml#/Game' }
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'
      '403':
        description: Not a registered reporter with permission to start the game
        content:
          application/json:
            schema: { $ref: '../components/schemas/common.yaml#/ErrorResponse' }
      '404':
        $ref: '../components/responses/common.yaml#/NotFound'

reactions:
  post:
    operationId: createGameReaction
    summary: Add an ephemeral live-game reaction from a spectator device
    security: []
    tags: [live-games]
    parameters:
      - in: path
        name: gameId
        required: true
        schema: { type: string }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../components/schemas/games.yaml#/CreateGameReactionInput' }
    responses:
      '201':
        description: Reaction recorded
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data: { $ref: '../components/schemas/games.yaml#/GameReaction' }
      '404':
        $ref: '../components/responses/common.yaml#/NotFound'

events:
  get:
    operationId: listGameEvents
    summary: Full ordered event log for a game (play-by-play) — works for any game status, not just LIVE
    security: []
    tags: [live-games]
    parameters:
      - in: path
        name: gameId
        required: true
        schema: { type: string }
    responses:
      '200':
        description: Events, ascending by clientTimestamp
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: array
                  items: { $ref: '../components/schemas/games.yaml#/GameEvent' }
      default:
        description: Unexpected error
        content:
          application/json:
            schema: { $ref: '../components/schemas/common.yaml#/ErrorResponse' }
      '404':
        $ref: '../components/responses/common.yaml#/NotFound'
  post:
    operationId: submitGameEvent
    summary: Submit a raw live-game event (offline-queueable by the client)
    tags: [live-games]
    parameters:
      - in: path
        name: gameId
        required: true
        schema: { type: string }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../components/schemas/games.yaml#/SubmitGameEventInput' }
    responses:
      '201':
        description: Event recorded (status reflects consensus so far)
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data: { $ref: '../components/schemas/games.yaml#/GameEvent' }
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'
      '403':
        description: Not a registered reporter for this game
        content:
          application/json:
            schema: { $ref: '../components/schemas/common.yaml#/ErrorResponse' }
      '404':
        $ref: '../components/responses/common.yaml#/NotFound'

event:
  delete:
    operationId: undoGameEvent
    summary: Undo an event submitted by the calling reporter
    tags: [live-games]
    parameters:
      - in: path
        name: gameId
        required: true
        schema: { type: string }
      - in: path
        name: eventId
        required: true
        schema: { type: string }
    responses:
      '200':
        description: Event marked rejected (kept in the raw log, not deleted)
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data: { $ref: '../components/schemas/games.yaml#/GameEvent' }
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'
      '403':
        description: Not the reporter who submitted this event
        content:
          application/json:
            schema: { $ref: '../components/schemas/common.yaml#/ErrorResponse' }
      '404':
        $ref: '../components/responses/common.yaml#/NotFound'

snapshot:
  get:
    operationId: getGameSnapshot
    summary: Live score, recent events, and reporter presence (poll for realtime-lite updates)
    security: []
    tags: [live-games]
    parameters:
      - in: path
        name: gameId
        required: true
        schema: { type: string }
    responses:
      '200':
        description: Snapshot
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data: { $ref: '../components/schemas/games.yaml#/GameSnapshot' }
      '404':
        $ref: '../components/responses/common.yaml#/NotFound'

finalize:
  post:
    operationId: finalizeGame
    summary: Run end-of-game reconciliation and publish the final box score
    tags: [live-games]
    parameters:
      - in: path
        name: gameId
        required: true
        schema: { type: string }
    responses:
      '200':
        description: Game finalized
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data: { $ref: '../components/schemas/games.yaml#/Game' }
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'
      '403':
        description: Not a registered reporter with permission to finalize
        content:
          application/json:
            schema: { $ref: '../components/schemas/common.yaml#/ErrorResponse' }
      '404':
        $ref: '../components/responses/common.yaml#/NotFound'

conflicts:
  get:
    operationId: listGameConflicts
    summary: List open live-scoring conflicts for a game
    tags: [live-games]
    parameters:
      - in: path
        name: gameId
        required: true
        schema: { type: string }
    responses:
      '200':
        description: Conflicts
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: array
                  items: { $ref: '../components/schemas/games.yaml#/GameConflict' }
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'
      '403':
        description: Not allowed to resolve conflicts
        content:
          application/json:
            schema: { $ref: '../components/schemas/common.yaml#/ErrorResponse' }

resolveConflict:
  post:
    operationId: resolveGameConflict
    summary: Resolve a live-scoring conflict by selecting the accepted event
    tags: [live-games]
    parameters:
      - in: path
        name: gameId
        required: true
        schema: { type: string }
      - in: path
        name: conflictId
        required: true
        schema: { type: string }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../components/schemas/games.yaml#/ResolveGameConflictInput' }
    responses:
      '200':
        description: Conflict resolved
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data: { $ref: '../components/schemas/games.yaml#/GameConflict' }
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'
      '403':
        description: Not allowed to resolve conflicts
        content:
          application/json:
            schema: { $ref: '../components/schemas/common.yaml#/ErrorResponse' }
      '404':
        $ref: '../components/responses/common.yaml#/NotFound'

markConflictDisputed:
  post:
    operationId: markGameConflictDisputed
    summary: Mark a live-scoring conflict as disputed instead of resolved
    tags: [live-games]
    parameters:
      - in: path
        name: gameId
        required: true
        schema: { type: string }
      - in: path
        name: conflictId
        required: true
        schema: { type: string }
    responses:
      '200':
        description: Conflict marked disputed
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data: { $ref: '../components/schemas/games.yaml#/GameConflict' }
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'
      '403':
        description: Not allowed to resolve conflicts
        content:
          application/json:
            schema: { $ref: '../components/schemas/common.yaml#/ErrorResponse' }
      '404':
        $ref: '../components/responses/common.yaml#/NotFound'
