collection:
  get:
    operationId: listImages
    summary: List stored images attached to a target
    security: []
    tags: [media]
    parameters:
      - in: query
        name: targetType
        required: true
        schema: { $ref: '../components/schemas/common.yaml#/EntityType' }
      - in: query
        name: targetId
        required: true
        schema: { type: string }
      - in: query
        name: usage
        schema: { $ref: '../components/schemas/social.yaml#/ImageAssetUsage' }
    responses:
      '200':
        description: Image assets
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data:
                  type: array
                  items: { $ref: '../components/schemas/social.yaml#/ImageAsset' }
      default:
        description: Unexpected error
        content:
          application/json:
            schema: { $ref: '../components/schemas/common.yaml#/ErrorResponse' }

upload:
  post:
    operationId: uploadImage
    summary: Upload an image and attach it to a target
    tags: [media]
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../components/schemas/social.yaml#/UploadImageInput' }
    responses:
      '201':
        description: Image uploaded
        content:
          application/json:
            schema:
              type: object
              required: [data]
              properties:
                data: { $ref: '../components/schemas/social.yaml#/ImageAsset' }
      '401':
        $ref: '../components/responses/common.yaml#/Unauthorized'
      default:
        description: Unexpected error
        content:
          application/json:
            schema: { $ref: '../components/schemas/common.yaml#/ErrorResponse' }
