openapi: 3.1.0
info:
  title: Statman API
  version: 0.0.1
  description: >
    Sport-agnostic athlete profile platform API. OpenAPI owns durable REST
    resources; realtime event contracts (live game rooms) are defined
    separately and are not part of this spec.

servers:
  - url: http://localhost:3001
    description: Local dev

security:
  - bearerAuth: []

tags:
  - name: auth
  - name: sports
  - name: leagues
  - name: teams
  - name: players
  - name: games
  - name: live-games
  - name: media
  - name: feed
  - name: follows
  - name: reactions
  - name: sources
  - name: disputes
  - name: claims
  - name: leaderboards
  - name: admin
  - name: cards
  - name: search

components:
  securitySchemes:
    bearerAuth:
      $ref: './components/security/schemes.yaml#/bearerAuth'
    adminAuth:
      $ref: './components/security/schemes.yaml#/adminAuth'

  parameters:
    Cursor:
      $ref: './components/parameters/common.yaml#/Cursor'
    Limit:
      $ref: './components/parameters/common.yaml#/Limit'
    SearchQuery:
      $ref: './components/parameters/common.yaml#/SearchQuery'

  responses:
    Unauthorized:
      $ref: './components/responses/common.yaml#/Unauthorized'
    NotFound:
      $ref: './components/responses/common.yaml#/NotFound'

  schemas:
    PaginatedMeta:
      $ref: './components/schemas/common.yaml#/PaginatedMeta'
    ErrorResponse:
      $ref: './components/schemas/common.yaml#/ErrorResponse'

    User:
      $ref: './components/schemas/auth.yaml#/User'
    Profile:
      $ref: './components/schemas/auth.yaml#/Profile'
    RegisterInput:
      $ref: './components/schemas/auth.yaml#/RegisterInput'
    LoginInput:
      $ref: './components/schemas/auth.yaml#/LoginInput'
    AuthResponse:
      $ref: './components/schemas/auth.yaml#/AuthResponse'
    MeCapabilities:
      $ref: './components/schemas/auth.yaml#/MeCapabilities'
    MeCapabilitiesResponse:
      $ref: './components/schemas/auth.yaml#/MeCapabilitiesResponse'

    Sport:
      $ref: './components/schemas/sports.yaml#/Sport'
    League:
      $ref: './components/schemas/sports.yaml#/League'
    Team:
      $ref: './components/schemas/sports.yaml#/Team'

    AthleteProfile:
      $ref: './components/schemas/players.yaml#/AthleteProfile'
    Player:
      $ref: './components/schemas/players.yaml#/Player'
    PaginatedPlayers:
      $ref: './components/schemas/players.yaml#/PaginatedPlayers'
    CreatePlayerInput:
      $ref: './components/schemas/players.yaml#/CreatePlayerInput'
    UpdatePlayerInput:
      $ref: './components/schemas/players.yaml#/UpdatePlayerInput'
    RosterMembership:
      $ref: './components/schemas/players.yaml#/RosterMembership'
    AddRosterMemberInput:
      $ref: './components/schemas/players.yaml#/AddRosterMemberInput'

    Game:
      $ref: './components/schemas/games.yaml#/Game'
    CreateGameInput:
      $ref: './components/schemas/games.yaml#/CreateGameInput'
    GameReporter:
      $ref: './components/schemas/games.yaml#/GameReporter'
    JoinReporterInput:
      $ref: './components/schemas/games.yaml#/JoinReporterInput'
    GameEvent:
      $ref: './components/schemas/games.yaml#/GameEvent'
    SubmitGameEventInput:
      $ref: './components/schemas/games.yaml#/SubmitGameEventInput'
    GameSnapshot:
      $ref: './components/schemas/games.yaml#/GameSnapshot'
    GameStatLine:
      $ref: './components/schemas/games.yaml#/GameStatLine'
    PlayerSeasonStat:
      $ref: './components/schemas/games.yaml#/PlayerSeasonStat'
    TeamSeasonStat:
      $ref: './components/schemas/games.yaml#/TeamSeasonStat'
    PlayerLeaderboardEntry:
      $ref: './components/schemas/games.yaml#/PlayerLeaderboardEntry'
    TeamLeaderboardEntry:
      $ref: './components/schemas/games.yaml#/TeamLeaderboardEntry'

    SearchResultType:
      $ref: './components/schemas/search.yaml#/SearchResultType'
    SearchResultItem:
      $ref: './components/schemas/search.yaml#/SearchResultItem'
    PaginatedSearchResults:
      $ref: './components/schemas/search.yaml#/PaginatedSearchResults'

    MediaAsset:
      $ref: './components/schemas/social.yaml#/MediaAsset'
    ImageAsset:
      $ref: './components/schemas/social.yaml#/ImageAsset'
    UploadImageInput:
      $ref: './components/schemas/social.yaml#/UploadImageInput'
    AttachYouTubeInput:
      $ref: './components/schemas/social.yaml#/AttachYouTubeInput'
    Follow:
      $ref: './components/schemas/social.yaml#/Follow'
    CreateFollowInput:
      $ref: './components/schemas/social.yaml#/CreateFollowInput'
    Reaction:
      $ref: './components/schemas/social.yaml#/Reaction'
    CreateReactionInput:
      $ref: './components/schemas/social.yaml#/CreateReactionInput'
    ReactionCounts:
      $ref: './components/schemas/social.yaml#/ReactionCounts'
    FeedItem:
      $ref: './components/schemas/social.yaml#/FeedItem'
    PaginatedFeed:
      $ref: './components/schemas/social.yaml#/PaginatedFeed'

    SourceReference:
      $ref: './components/schemas/verification.yaml#/SourceReference'
    CreateSourceReferenceInput:
      $ref: './components/schemas/verification.yaml#/CreateSourceReferenceInput'
    Dispute:
      $ref: './components/schemas/verification.yaml#/Dispute'
    OpenDisputeInput:
      $ref: './components/schemas/verification.yaml#/OpenDisputeInput'
    ResolveDisputeInput:
      $ref: './components/schemas/verification.yaml#/ResolveDisputeInput'
    Claim:
      $ref: './components/schemas/verification.yaml#/Claim'
    ClaimPlayerInput:
      $ref: './components/schemas/verification.yaml#/ClaimPlayerInput'
    ReviewClaimInput:
      $ref: './components/schemas/verification.yaml#/ReviewClaimInput'
    VerifyPlayerInput:
      $ref: './components/schemas/verification.yaml#/VerifyPlayerInput'

    AdminMetrics:
      $ref: './components/schemas/admin.yaml#/AdminMetrics'
    BulkCreatePlayersInput:
      $ref: './components/schemas/admin.yaml#/BulkCreatePlayersInput'
    BulkCreatePlayersResult:
      $ref: './components/schemas/admin.yaml#/BulkCreatePlayersResult'
    BulkAddRosterMembersInput:
      $ref: './components/schemas/admin.yaml#/BulkAddRosterMembersInput'
    BulkAddRosterMembersResult:
      $ref: './components/schemas/admin.yaml#/BulkAddRosterMembersResult'
    CreateFeedItemInput:
      $ref: './components/schemas/admin.yaml#/CreateFeedItemInput'
    AdminAuditLogEntry:
      $ref: './components/schemas/admin.yaml#/AdminAuditLogEntry'
    PaginatedAdminAuditLog:
      $ref: './components/schemas/admin.yaml#/PaginatedAdminAuditLog'

    Card:
      $ref: './components/schemas/cards.yaml#/Card'
    CardIssue:
      $ref: './components/schemas/cards.yaml#/CardIssue'
    CreateCardInput:
      $ref: './components/schemas/cards.yaml#/CreateCardInput'
    UpdateCardInput:
      $ref: './components/schemas/cards.yaml#/UpdateCardInput'
    PublishCardInput:
      $ref: './components/schemas/cards.yaml#/PublishCardInput'
    MyCard:
      $ref: './components/schemas/cards.yaml#/MyCard'

paths:
  /auth/register:
    $ref: './paths/auth.yaml#/register'
  /auth/login:
    $ref: './paths/auth.yaml#/login'
  /auth/logout:
    $ref: './paths/auth.yaml#/logout'
  /auth/me:
    $ref: './paths/auth.yaml#/me'
  /auth/me/capabilities:
    $ref: './paths/auth.yaml#/capabilities'

  /sports:
    $ref: './paths/sports.yaml#/list'

  /leagues:
    $ref: './paths/leagues.yaml#/list'
  /leagues/{leagueSlug}:
    $ref: './paths/leagues.yaml#/get'

  /teams:
    $ref: './paths/teams.yaml#/list'
  /teams/{teamSlug}:
    $ref: './paths/teams.yaml#/get'
  /teams/{teamSlug}/roster:
    $ref: './paths/teams.yaml#/roster'
  /teams/{teamSlug}/stats:
    $ref: './paths/stats.yaml#/teamSeasonStats'
  /teams/{teamId}/roster/members:
    $ref: './paths/teams.yaml#/addRosterMember'

  /players:
    $ref: './paths/players.yaml#/collection'
  /players/{playerId}:
    $ref: './paths/players.yaml#/item'
  /players/{playerId}/games:
    $ref: './paths/stats.yaml#/playerGames'
  /players/{playerId}/stats:
    $ref: './paths/stats.yaml#/playerSeasonStats'
  /players/{playerId}/claim:
    $ref: './paths/players.yaml#/claim'
  /players/{playerId}/verify:
    $ref: './paths/players.yaml#/verify'

  /games:
    $ref: './paths/games.yaml#/collection'
  /games/{gameId}:
    $ref: './paths/games.yaml#/item'
  /games/{gameId}/reporters:
    $ref: './paths/live-games.yaml#/reporters'
  /games/{gameId}/reporters/invite:
    $ref: './paths/live-games.yaml#/inviteReporter'
  /games/{gameId}/reporters/{reporterId}:
    $ref: './paths/live-games.yaml#/reporter'
  /games/{gameId}/start-live:
    $ref: './paths/live-games.yaml#/startLive'
  /games/{gameId}/reactions:
    $ref: './paths/live-games.yaml#/reactions'
  /games/{gameId}/events:
    $ref: './paths/live-games.yaml#/events'
  /games/{gameId}/events/{eventId}:
    $ref: './paths/live-games.yaml#/event'
  /games/{gameId}/snapshot:
    $ref: './paths/live-games.yaml#/snapshot'
  /games/{gameId}/finalize:
    $ref: './paths/live-games.yaml#/finalize'
  /games/{gameId}/conflicts:
    $ref: './paths/live-games.yaml#/conflicts'
  /games/{gameId}/conflicts/{conflictId}/resolve:
    $ref: './paths/live-games.yaml#/resolveConflict'
  /games/{gameId}/conflicts/{conflictId}/mark-disputed:
    $ref: './paths/live-games.yaml#/markConflictDisputed'
  /games/{gameId}/stats:
    $ref: './paths/stats.yaml#/gameStats'

  /leaderboards/players:
    $ref: './paths/leaderboards.yaml#/players'
  /leaderboards/teams:
    $ref: './paths/leaderboards.yaml#/teams'

  /search:
    $ref: './paths/search.yaml#/collection'

  /media:
    $ref: './paths/media.yaml#/collection'
  /media/recent:
    $ref: './paths/media.yaml#/recent'
  /media/youtube:
    $ref: './paths/media.yaml#/youtube'
  /images:
    $ref: './paths/images.yaml#/collection'
  /images/upload:
    $ref: './paths/images.yaml#/upload'

  /follows:
    $ref: './paths/follows.yaml#/collection'
  /follows/{followId}:
    $ref: './paths/follows.yaml#/item'

  /reactions:
    $ref: './paths/reactions.yaml#/collection'
  /reactions/{reactionId}:
    $ref: './paths/reactions.yaml#/item'

  /feed:
    $ref: './paths/feed.yaml#/get'

  /sources:
    $ref: './paths/sources.yaml#/collection'

  /disputes:
    $ref: './paths/disputes.yaml#/collection'
  /disputes/{disputeId}:
    $ref: './paths/disputes.yaml#/item'

  /claims:
    $ref: './paths/claims.yaml#/collection'
  /claims/{claimId}:
    $ref: './paths/claims.yaml#/item'

  /admin/metrics:
    $ref: './paths/admin.yaml#/metrics'
  /admin/players/bulk:
    $ref: './paths/admin.yaml#/bulkCreatePlayers'
  /admin/teams/{teamId}/roster/bulk:
    $ref: './paths/admin.yaml#/bulkAddRosterMembers'
  /admin/disputes:
    $ref: './paths/admin.yaml#/adminDisputes'
  /admin/feed-items:
    $ref: './paths/admin.yaml#/createFeedItem'
  /admin/audit-log:
    $ref: './paths/admin.yaml#/auditLog'

  /cards:
    $ref: './paths/cards.yaml#/collection'
  /cards/recent:
    $ref: './paths/cards.yaml#/recent'
  /cards/{cardId}:
    $ref: './paths/cards.yaml#/item'
  /cards/{cardId}/generate:
    $ref: './paths/cards.yaml#/generate'
  /cards/{cardId}/publish:
    $ref: './paths/cards.yaml#/publish'
  /cards/{cardId}/claim:
    $ref: './paths/cards.yaml#/claim'
  /athlete-profiles/{athleteProfileId}/cards:
    $ref: './paths/cards.yaml#/athleteCards'
  /me/cards:
    $ref: './paths/cards.yaml#/mine'
  /card-issues/{issueId}/downloaded:
    $ref: './paths/cards.yaml#/downloaded'
