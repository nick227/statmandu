GameStatus:
  type: string
  enum: [SCHEDULED, LIVE, FINAL, DISPUTED]

GameTeamSummary:
  type: object
  required: [teamId, isHome]
  properties:
    teamId: { type: string }
    isHome: { type: boolean }
    finalScore: { type: ['integer', 'null'] }
    team: { $ref: './sports.yaml#/Team' }

Game:
  type: object
  required: [id, sportId, scheduledAt, status, gameTeams]
  properties:
    id: { type: string }
    sportId: { type: string }
    sport: { $ref: './sports.yaml#/Sport' }
    leagueId: { type: ['string', 'null'] }
    seasonId: { type: ['string', 'null'] }
    scheduledAt: { type: string, format: date-time }
    venue: { type: ['string', 'null'] }
    status: { $ref: '#/GameStatus' }
    startedAt: { type: ['string', 'null'], format: date-time }
    finalizedAt: { type: ['string', 'null'], format: date-time }
    gameTeams:
      type: array
      items: { $ref: '#/GameTeamSummary' }

CreateGameInput:
  type: object
  required: [sportSlug, scheduledAt, homeTeamId, awayTeamId]
  properties:
    sportSlug: { type: string }
    seasonId: { type: string }
    scheduledAt: { type: string, format: date-time }
    venue: { type: string }
    homeTeamId: { type: string }
    awayTeamId: { type: string }

GameReporterRole:
  type: string
  enum: [ADMIN_OWNER, OFFICIAL_SCORER, TEAM_SCORER, BROADCASTER, CONTRIBUTOR, SPECTATOR_REPORTER, VIEWER]

JoinReporterInput:
  type: object
  required: [role]
  properties:
    role: { $ref: '#/GameReporterRole' }
    teamId: { type: string }

InviteReporterInput:
  type: object
  required: [userId, role]
  properties:
    userId: { type: string }
    role: { $ref: '#/GameReporterRole' }
    teamId: { type: string }

UpdateReporterInput:
  type: object
  properties:
    role: { $ref: '#/GameReporterRole' }
    teamId: { type: ['string', 'null'] }

GameReporter:
  type: object
  required: [id, gameId, userId, role]
  properties:
    id: { type: string }
    gameId: { type: string }
    userId: { type: string }
    teamId: { type: ['string', 'null'] }
    role: { $ref: '#/GameReporterRole' }

GameEventType:
  type: string
  enum:
    - FT_MADE
    - FT_MISS
    - FG2_MADE
    - FG2_MISS
    - FG3_MADE
    - FG3_MISS
    - REBOUND_OFF
    - REBOUND_DEF
    - ASSIST
    - STEAL
    - BLOCK
    - TURNOVER
    - FOUL
    - SUBSTITUTION_IN
    - SUBSTITUTION_OUT
    - SOCCER_GOAL
    - SOCCER_ASSIST
    - SOCCER_SHOT
    - SOCCER_SAVE
    - SOCCER_YELLOW_CARD
    - SOCCER_RED_CARD
    - FOOTBALL_PASS_TD
    - FOOTBALL_RUSH_TD
    - FOOTBALL_REC_TD
    - FOOTBALL_FIELD_GOAL_MADE
    - FOOTBALL_EXTRA_POINT_MADE
    - FOOTBALL_SACK
    - FOOTBALL_INTERCEPTION
    - TENNIS_MATCH_WIN
    - TENNIS_MATCH_LOSS
    - TENNIS_SET_WIN
    - TENNIS_SET_LOSS
    - TENNIS_ACE
    - TENNIS_DOUBLE_FAULT

GameEventStatus:
  type: string
  enum: [PENDING, ACCEPTED, REJECTED, CONFLICTING, CORRECTED, DISPUTED, FINALIZED]

SubmitGameEventInput:
  type: object
  required: [type, clientTimestamp]
  properties:
    type: { $ref: '#/GameEventType' }
    playerId: { type: string }
    teamId: { type: string }
    clientTimestamp: { type: string, format: date-time }
    deviceId: { type: string }

GameEvent:
  type: object
  required: [id, gameId, reporterId, type, status, clientTimestamp]
  properties:
    id: { type: string }
    gameId: { type: string }
    reporterId: { type: string }
    playerId: { type: ['string', 'null'] }
    teamId: { type: ['string', 'null'] }
    type: { $ref: '#/GameEventType' }
    status: { $ref: '#/GameEventStatus' }
    clientTimestamp: { type: string, format: date-time }
    consensusGroupId: { type: ['string', 'null'] }

GameConflictStatus:
  type: string
  enum: [PENDING, CONFIRMED, CONFLICTING, RESOLVED]

GameConflict:
  type: object
  required: [id, gameId, groupKey, status, events]
  properties:
    id: { type: string }
    gameId: { type: string }
    groupKey: { type: string }
    status: { $ref: '#/GameConflictStatus' }
    resolvedEventId: { type: ['string', 'null'] }
    events:
      type: array
      items: { $ref: '#/GameEvent' }

ResolveGameConflictInput:
  type: object
  required: [resolvedEventId]
  properties:
    resolvedEventId: { type: string }

GameSnapshot:
  type: object
  required: [gameId, status, score, recentEvents, reporterCount]
  properties:
    gameId: { type: string }
    youtubeVideoId: { type: ['string', 'null'] }
    status: { $ref: '#/GameStatus' }
    score:
      type: array
      items:
        type: object
        required: [teamId, points]
        properties:
          teamId: { type: string }
          points: { type: integer }
    recentEvents:
      type: array
      items: { $ref: '#/GameEvent' }
    reporterCount: { type: integer }

GameStatLine:
  type: object
  required:
    - id
    - gameId
    - playerId
    - teamId
    - points
    - offRebounds
    - defRebounds
    - assists
    - steals
    - blocks
    - turnovers
    - fouls
    - fgMade
    - fgAttempted
    - threeMade
    - threeAttempted
    - ftMade
    - ftAttempted
    - sourceStatus
    - playerName
    - gameOpponentName
    - gameScheduledAt
  properties:
    id: { type: string }
    gameId: { type: string }
    playerId: { type: string }
    teamId: { type: string }
    # Flattened context so a stat line is self-identifying and linkable
    # without the caller needing a second fetch — a box-score row (many
    # players, one game) needs the player's name; a player's game-log row
    # (one player, many games) needs the opponent + date. Both are always
    # populated regardless of which direction the query came from.
    playerName: { type: string }
    gameOpponentName: { type: string }
    gameScheduledAt: { type: string, format: date-time }
    points: { type: integer }
    offRebounds: { type: integer }
    defRebounds: { type: integer }
    assists: { type: integer }
    steals: { type: integer }
    blocks: { type: integer }
    turnovers: { type: integer }
    fouls: { type: integer }
    fgMade: { type: integer }
    fgAttempted: { type: integer }
    threeMade: { type: integer }
    threeAttempted: { type: integer }
    ftMade: { type: integer }
    ftAttempted: { type: integer }
    stats:
      type: object
      additionalProperties: true
    sourceStatus: { $ref: './common.yaml#/SourceStatus' }
    disputeNote: { type: ['string', 'null'] }

PlayerSeasonStat:
  type: object
  required:
    - id
    - playerId
    - seasonId
    - gamesPlayed
    - points
    - offRebounds
    - defRebounds
    - assists
    - steals
    - blocks
    - turnovers
    - fouls
    - fgMade
    - fgAttempted
    - threeMade
    - threeAttempted
    - ftMade
    - ftAttempted
  properties:
    id: { type: string }
    playerId: { type: string }
    seasonId: { type: string }
    gamesPlayed: { type: integer }
    points: { type: integer }
    offRebounds: { type: integer }
    defRebounds: { type: integer }
    assists: { type: integer }
    steals: { type: integer }
    blocks: { type: integer }
    turnovers: { type: integer }
    fouls: { type: integer }
    fgMade: { type: integer }
    fgAttempted: { type: integer }
    threeMade: { type: integer }
    threeAttempted: { type: integer }
    ftMade: { type: integer }
    ftAttempted: { type: integer }
    stats:
      type: object
      additionalProperties: true

TeamSeasonStat:
  type: object
  required:
    - id
    - teamId
    - seasonId
    - wins
    - losses
    - pointsFor
    - pointsAgainst
  properties:
    id: { type: string }
    teamId: { type: string }
    seasonId: { type: string }
    wins: { type: integer }
    losses: { type: integer }
    pointsFor: { type: integer }
    pointsAgainst: { type: integer }
    stats:
      type: object
      additionalProperties: true

PlayerLeaderboardEntry:
  type: object
  required: [rank, stat, value, player, seasonStat]
  properties:
    rank: { type: integer }
    stat: { type: string }
    value: { type: number }
    player: { $ref: './players.yaml#/Player' }
    seasonStat: { $ref: '#/PlayerSeasonStat' }

TeamLeaderboardEntry:
  type: object
  required: [rank, stat, value, team, seasonStat]
  properties:
    rank: { type: integer }
    stat: { type: string }
    value: { type: number }
    team: { $ref: './sports.yaml#/Team' }
    seasonStat: { $ref: '#/TeamSeasonStat' }
