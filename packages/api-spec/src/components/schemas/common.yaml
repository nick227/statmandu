PaginatedMeta:
  type: object
  required: [hasMore, nextCursor]
  properties:
    hasMore: { type: boolean }
    nextCursor:
      type: ['string', 'null']

ErrorResponse:
  type: object
  required: [error]
  properties:
    error: { type: string }
    code: { type: string }

SourceStatus:
  type: string
  enum:
    - PLAYER_REPORTED
    - SPECTATOR_REPORTED
    - MULTI_SPECTATOR_CONFIRMED
    - TEAM_MANAGER_ENTERED
    - OFFICIAL_SCORER_RECORDED
    - VERIFIED_TEAM_ACCOUNT
    - ONLINE_SOURCE_IMPORTED
    - PUBLIC_SOURCE_SCRAPED
    - IN_DISPUTE

EntityType:
  type: string
  description: Shared polymorphic target vocabulary (mirrors the Prisma EntityType enum).
  enum:
    - PLAYER
    - TEAM
    - GAME
    - FEED_ITEM
    - ATHLETE_PROFILE
    - GAME_STAT_LINE
    - GAME_EVENT
    - PROFILE_FIELD
    - SOURCE_REFERENCE
    - PLAYER_SEASON_STAT
    - TEAM_SEASON_STAT
    - CARD_TEMPLATE
    - CARD_ISSUE
