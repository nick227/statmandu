MediaAsset:
  type: object
  required: [id, type, youtubeVideoId, targetType, targetId, createdAt]
  properties:
    id: { type: string }
    type: { type: string, enum: [YOUTUBE] }
    youtubeVideoId: { type: string }
    title: { type: ['string', 'null'] }
    targetType: { $ref: './common.yaml#/EntityType' }
    targetId: { type: string }
    createdAt: { type: string, format: date-time }

ImageAssetUsage:
  type: string
  enum: [AVATAR, LOGO, HERO, EVIDENCE, GALLERY]

ImageStorageProvider:
  type: string
  enum: [LOCAL, R2, RAILWAY_VOLUME]

ImageAsset:
  type: object
  required: [id, targetType, targetId, usage, storageProvider, objectKey, url, contentType, byteSize, createdAt]
  properties:
    id: { type: string }
    targetType: { $ref: './common.yaml#/EntityType' }
    targetId: { type: string }
    usage: { $ref: '#/ImageAssetUsage' }
    storageProvider: { $ref: '#/ImageStorageProvider' }
    objectKey: { type: string }
    url: { type: string }
    originalFilename: { type: ['string', 'null'] }
    contentType: { type: string }
    byteSize: { type: integer }
    width: { type: ['integer', 'null'] }
    height: { type: ['integer', 'null'] }
    uploadedByUserId: { type: ['string', 'null'] }
    createdAt: { type: string, format: date-time }

UploadImageInput:
  type: object
  required: [targetType, targetId, usage, contentType, file]
  properties:
    targetType: { $ref: './common.yaml#/EntityType' }
    targetId: { type: string }
    usage: { $ref: '#/ImageAssetUsage' }
    contentType: { type: string, enum: [image/jpeg, image/png, image/webp] }
    file: { type: string, format: binary }
    originalFilename: { type: string, maxLength: 200 }
    width: { type: integer, minimum: 1 }
    height: { type: integer, minimum: 1 }

AttachYouTubeInput:
  type: object
  required: [targetType, targetId, youtubeUrl]
  properties:
    targetType: { $ref: './common.yaml#/EntityType' }
    targetId: { type: string }
    youtubeUrl: { type: string, format: uri }
    title: { type: string, maxLength: 200 }

Follow:
  type: object
  required: [id, followerId, targetType, targetId]
  properties:
    id: { type: string }
    followerId: { type: string }
    targetType: { $ref: './common.yaml#/EntityType' }
    targetId: { type: string }

CreateFollowInput:
  type: object
  required: [targetType, targetId]
  properties:
    targetType: { $ref: './common.yaml#/EntityType' }
    targetId: { type: string }

ReactionType:
  type: string
  enum: [LIKE, FIRE, CLAP]

Reaction:
  type: object
  required: [id, userId, targetType, targetId, type]
  properties:
    id: { type: string }
    userId: { type: string }
    targetType: { $ref: './common.yaml#/EntityType' }
    targetId: { type: string }
    type: { $ref: '#/ReactionType' }

CreateReactionInput:
  type: object
  required: [targetType, targetId, type]
  properties:
    targetType: { $ref: './common.yaml#/EntityType' }
    targetId: { type: string }
    type: { $ref: '#/ReactionType' }

ReactionCounts:
  type: object
  required: [total, byType]
  properties:
    total: { type: integer }
    byType:
      type: object
      additionalProperties: { type: integer }

FeedItem:
  type: object
  required: [id, type, targetType, targetId, summary, occurredAt]
  properties:
    id: { type: string }
    type:
      type: string
      enum: [GAME_FINAL, STAT_MILESTONE, MEDIA_ADDED, PLAYER_JOINED_TEAM, PROFILE_CLAIMED, DISPUTE_RESOLVED, CARD_PUBLISHED, CARD_CLAIMED, CARD_DOWNLOADED]
    targetType: { $ref: './common.yaml#/EntityType' }
    targetId: { type: string }
    summary: { type: string }
    occurredAt: { type: string, format: date-time }

PaginatedFeed:
  type: object
  required: [data, meta]
  properties:
    data:
      type: array
      items: { $ref: '#/FeedItem' }
    meta: { $ref: './common.yaml#/PaginatedMeta' }
